name: Upstream sync check

on:
  schedule:
    # Monthly, 1st day @ 08:00 UTC
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Compare BTS manifest version vs upstream tolwi latest release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read local manifest version
        id: local
        run: |
          ver=$(jq -r .version custom_components/ecoflow_cloud/manifest.json)
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Local BTS version: $ver"

      - name: Read upstream latest release tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release view --repo tolwi/hassio-ecoflow-cloud --json tagName --jq .tagName)
          echo "tag=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Upstream latest tag: $tag"

      - name: Compare versions (semver)
        id: compare
        env:
          LOCAL: ${{ steps.local.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.tag }}
        run: |
          # Strip any +bts.N suffix from local for the semver comparison —
          # we only care about the upstream-base part vs upstream tag.
          LOCAL_BASE="${LOCAL%%+*}"
          UPSTREAM_CLEAN="${UPSTREAM#v}"

          # Use sort -V for natural version comparison. Drift = upstream > local-base.
          # If upstream <= local-base, BTS is already ahead (expected for our fork)
          # and no issue should be opened.
          if [ "$LOCAL_BASE" = "$UPSTREAM_CLEAN" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Local base $LOCAL_BASE matches upstream $UPSTREAM_CLEAN — in sync"
          else
            highest=$(printf '%s\n%s\n' "$LOCAL_BASE" "$UPSTREAM_CLEAN" | sort -V | tail -n1)
            if [ "$highest" = "$UPSTREAM_CLEAN" ]; then
              echo "drift=true" >> "$GITHUB_OUTPUT"
              echo "Upstream $UPSTREAM_CLEAN > local base $LOCAL_BASE — drift detected"
            else
              echo "drift=false" >> "$GITHUB_OUTPUT"
              echo "Local base $LOCAL_BASE > upstream $UPSTREAM_CLEAN — BTS is ahead, no drift"
            fi
          fi

      - name: Open issue if drift detected
        if: steps.compare.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCAL: ${{ steps.local.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.tag }}
        run: |
          existing=$(gh issue list --search "Upstream drift in:title" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Open drift issue already exists (#$existing) — skipping"
            exit 0
          fi
          body=$(printf '%s\n' \
            "Monthly check found upstream tolwi/hassio-ecoflow-cloud has a newer release than this fork." \
            "" \
            "- BTS local manifest: \`${LOCAL}\`" \
            "- Upstream latest: \`v${UPSTREAM}\`" \
            "- Compare: https://github.com/tolwi/hassio-ecoflow-cloud/compare/v${LOCAL}...v${UPSTREAM}" \
            "" \
            "Review-Schritt:" \
            "1. Diff prüfen — vor allem auf \`devices/public/stream_*.py\` (BTS-Patches betroffen?)" \
            "2. Lokal mergen, Konflikte resolven" \
            "3. \`manifest.json\` version bumpen (Patch-Level oder \`+bts.<N>\`-Suffix)" \
            "4. \`BTS-FORK.md\` ggf. um neue Upstream-Notes ergänzen" \
            "5. Smoke-Tests laufen lassen (\`pytest tests/\`)" \
            "6. Tag + Release pushen → release-drafter generiert Notes")
          gh issue create \
            --title "Upstream drift: tolwi v${UPSTREAM} > BTS v${LOCAL}" \
            --label "upstream-sync" \
            --body "$body"
